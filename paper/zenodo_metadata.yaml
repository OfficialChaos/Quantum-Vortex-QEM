title: "Fluid-Dynamic Stability Filtering for Zero-Noise Extrapolation in NISQ-Era Quantum Circuits"

creators:
  - name: "Shawn G. Kleipe"
    orcid: "0009-0002-2480-2430"
    affiliation: "Independent Researcher"

description: |
  Implementation and experimental evaluation of two contributions to
  quantum error mitigation (QEM):

  1. A fluid-dynamic stability filter using the Navier-Stokes energy
     dissipation norm (ε = ν∫||∇u||²dΩ < Γ) applied to Zero-Noise
     Extrapolation (ZNE) residuals as a post-hoc reliability criterion.

  2. A Fibonacci noise scaling schedule (τ_n = τ_{n-1} + τ_{n-2})
     as an alternative to conventional linear or odd-integer ZNE scaling.

  Evaluated across circuit depths d ∈ {2,4,6,8} and depolarizing noise
  levels p ∈ {0.001, 0.005, 0.01, 0.02, 0.05} using shot-based density
  matrix simulation in Cirq. Code implemented with Cirq and Mitiq.

